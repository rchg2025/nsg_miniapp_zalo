<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị viên</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" />
    <link rel="stylesheet" href="./admin.css">
</head>
<body class="bg-gray-100">
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center">
                <button onclick="goBack()" class="text-gray-800 mr-4">
                    <i class='bx bx-arrow-back text-2xl'></i>
                </button>
                <h1 class="text-lg font-bold text-gray-800">Quản trị nội dung</h1>
            </div>
            <div class="flex space-x-2">
                <button id="toggle-view" class="text-gray-600 p-2 rounded-lg hover:bg-gray-100">
                    <i class='bx bx-list-ul text-xl'></i>
                </button>
                <button id="refresh-btn" class="text-gray-600 p-2 rounded-lg hover:bg-gray-100">
                    <i class='bx bx-refresh text-xl'></i>
                </button>
            </div>
        </div>
        
        <!-- Tab Navigation -->
        <div class="border-t border-gray-200">
            <div class="container mx-auto px-4">
                <div class="flex space-x-1">
                    <button class="tab-btn active px-4 py-3 text-sm font-medium border-b-2 border-blue-600 text-blue-600" data-tab="add">
                        <i class='bx bx-plus mr-1'></i>Thêm bài viết
                    </button>
                    <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-tab="manage">
                        <i class='bx bx-edit mr-1'></i>Quản lý bài viết
                    </button>
                    <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700" data-tab="stats">
                        <i class='bx bx-bar-chart-alt-2 mr-1'></i>Thống kê
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 pb-6">
        <!-- Add News Tab -->
        <div id="tab-add" class="tab-content">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <form id="add-news-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="news-title" class="block text-sm font-medium text-gray-700 mb-1">Tiêu đề bài viết *</label>
                            <input type="text" id="news-title" name="title" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        </div>
                        <div>
                            <label for="news-category" class="block text-sm font-medium text-gray-700 mb-1">Chuyên mục *</label>
                            <select id="news-category" name="category" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                <option value="">Chọn chuyên mục</option>
                                <option value="Hoạt động">Hoạt động</option>
                                <option value="Đào tạo">Đào tạo</option>
                                <option value="Sự kiện">Sự kiện</option>
                                <option value="Thể thao">Thể thao</option>
                                <option value="Thông báo">Thông báo</option>
                            </select>
                        </div>
                    </div>
                    
                    <div>
                        <label for="news-image-url" class="block text-sm font-medium text-gray-700 mb-1">Link hình ảnh *</label>
                        <input type="url" id="news-image-url" name="imageUrl" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        <div id="image-preview" class="mt-2 hidden">
                            <img id="preview-img" src="" alt="Preview" class="w-full h-48 object-cover rounded-md">
                        </div>
                    </div>
                    
                    <div>
                        <label for="news-excerpt" class="block text-sm font-medium text-gray-700 mb-1">Mô tả ngắn *</label>
                        <textarea id="news-excerpt" name="excerpt" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Nhập mô tả ngắn gọn về bài viết..." required></textarea>
                        <p class="text-xs text-gray-500 mt-1">Tối đa 200 ký tự</p>
                    </div>
                    
                    <div>
                        <label for="news-content" class="block text-sm font-medium text-gray-700 mb-1">Nội dung chi tiết *</label>
                        <textarea id="news-content" name="content" rows="8" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Nhập nội dung chi tiết của bài viết..." required></textarea>
                    </div>
                    
                    <div class="flex space-x-4">
                        <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 flex items-center justify-center">
                            <i class='bx bx-check mr-2'></i>Đăng bài
                        </button>
                        <button type="button" id="preview-btn" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-4 rounded-lg transition duration-300 flex items-center">
                            <i class='bx bx-show mr-2'></i>Xem trước
                        </button>
                        <button type="reset" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg transition duration-300 flex items-center">
                            <i class='bx bx-reset mr-2'></i>Đặt lại
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Manage News Tab -->
        <div id="tab-manage" class="tab-content hidden">
            <div class="bg-white rounded-lg shadow-md">
                <div class="p-4 border-b border-gray-200">
                    <div class="flex items-center justify-between">
                        <h2 class="text-lg font-bold text-gray-800">Danh sách bài viết</h2>
                        <div class="flex space-x-2">
                            <input type="text" id="search-input" placeholder="Tìm kiếm bài viết..." class="px-3 py-2 border border-gray-300 rounded-md text-sm">
                            <button id="search-btn" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
                                <i class='bx bx-search'></i>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div id="news-list" class="divide-y divide-gray-200">
                    <!-- News items will be loaded here -->
                </div>
                
                <div class="p-4 text-center">
                    <button id="load-more-news" class="bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600">
                        Tải thêm
                    </button>
                </div>
            </div>
        </div>

        <!-- Statistics Tab -->
        <div id="tab-stats" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <div class="bg-white p-6 rounded-lg shadow-md text-center">
                    <i class='bx bxs-news text-3xl text-blue-600 mb-2'></i>
                    <h3 class="text-2xl font-bold text-gray-800">24</h3>
                    <p class="text-gray-600">Tổng bài viết</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md text-center">
                    <i class='bx bxs-user text-3xl text-green-600 mb-2'></i>
                    <h3 class="text-2xl font-bold text-gray-800">1,247</h3>
                    <p class="text-gray-600">Lượt xem</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md text-center">
                    <i class='bx bxs-heart text-3xl text-red-600 mb-2'></i>
                    <h3 class="text-2xl font-bold text-gray-800">89</h3>
                    <p class="text-gray-600">Lượt thích</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md text-center">
                    <i class='bx bxs-share-alt text-3xl text-purple-600 mb-2'></i>
                    <h3 class="text-2xl font-bold text-gray-800">32</h3>
                    <p class="text-gray-600">Lượt chia sẻ</p>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h3 class="text-lg font-bold text-gray-800 mb-4">Bài viết phổ biến</h3>
                <div id="popular-news" class="space-y-3">
                    <!-- Popular news will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-6 rounded-lg text-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p class="text-gray-700">Đang xử lý...</p>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-6 rounded-lg max-w-sm w-full mx-4">
            <div class="text-center">
                <i class='bx bx-check-circle text-5xl text-green-600 mb-4'></i>
                <h3 class="text-lg font-bold text-gray-800 mb-2">Thành công!</h3>
                <p class="text-gray-600 mb-4">Bài viết đã được đăng thành công.</p>
                <button id="close-success-modal" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                    Đóng
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/zmp-sdk@latest/zmp-sdk.min.js"></script>
    <script src="../utils/data.js"></script>
    <script src="./admin.js"></script>
</body>
</html>
