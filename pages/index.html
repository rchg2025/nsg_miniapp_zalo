<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CĐ Bách khoa Nam Sài Gòn</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" />
    <link rel="stylesheet" href="./index.css">
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 left-0 right-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center">
                <img src="https://placehold.co/40x40/005baa/FFFFFF?text=NSG" alt="Logo NSG" class="h-10 w-10 rounded-full mr-3">
                <h1 class="text-lg font-bold text-gray-800">CĐ Bách khoa Nam Sài Gòn</h1>
            </div>
            <div class="flex items-center space-x-2">
                <button id="search-btn" class="text-gray-600 p-2 rounded-full hover:bg-gray-100">
                    <i class='bx bx-search text-xl'></i>
                </button>
                <button id="notification-btn" class="text-gray-600 p-2 rounded-full hover:bg-gray-100 relative">
                    <i class='bx bx-bell text-xl'></i>
                    <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">3</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Search Bar (ẩn ban đầu) -->
    <div id="search-container" class="bg-white border-b border-gray-200 px-4 py-3 hidden">
        <div class="flex items-center space-x-2">
            <input 
                type="text" 
                id="search-input" 
                placeholder="Tìm kiếm tin tức..." 
                class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
            <button id="search-close" class="text-gray-600 p-2">
                <i class='bx bx-x text-xl'></i>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mx-auto p-4 pb-20">
        <!-- Banner nổi bật -->
        <div class="mb-6 rounded-lg overflow-hidden shadow-lg cursor-pointer" onclick="viewNews(0)">
            <img src="https://placehold.co/600x300/005baa/FFFFFF?text=Sự+kiện+nổi+bật" alt="Sự kiện nổi bật" class="w-full h-auto object-cover">
             <div class="p-4 bg-white">
                <h2 class="font-bold text-xl mb-1 text-gray-900">Ngày hội tuyển sinh 2025</h2>
                <p class="text-gray-600 text-sm">Cơ hội gặp gỡ, tư vấn và định hướng nghề nghiệp trực tiếp từ các khoa.</p>
                <div class="flex items-center mt-2 text-xs text-gray-500">
                    <i class='bx bx-time mr-1'></i>
                    <span>23/09/2025</span>
                </div>
            </div>
        </div>

        <!-- Categories Filter -->
        <div class="mb-4">
            <div class="flex space-x-2 overflow-x-auto pb-2">
                <button class="category-filter active bg-blue-600 text-white px-4 py-2 rounded-full text-sm whitespace-nowrap" data-category="all">
                    Tất cả
                </button>
                <button class="category-filter bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm whitespace-nowrap hover:bg-gray-300" data-category="Hoạt động">
                    Hoạt động
                </button>
                <button class="category-filter bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm whitespace-nowrap hover:bg-gray-300" data-category="Đào tạo">
                    Đào tạo
                </button>
                <button class="category-filter bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm whitespace-nowrap hover:bg-gray-300" data-category="Sự kiện">
                    Sự kiện
                </button>
                <button class="category-filter bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm whitespace-nowrap hover:bg-gray-300" data-category="Thể thao">
                    Thể thao
                </button>
            </div>
        </div>
        
        <!-- Loading indicator -->
        <div id="loading" class="hidden text-center py-4">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <p class="mt-2 text-gray-600">Đang tải...</p>
        </div>

        <!-- Danh sách tin tức -->
        <div id="news-list" class="space-y-4">
            <!-- Tin tức sẽ được chèn vào đây bằng JavaScript -->
        </div>

        <!-- Load more button -->
        <div class="text-center mt-6">
            <button id="load-more" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors">
                Xem thêm
            </button>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-t-md border-t border-gray-200 flex justify-around z-50">
        <a href="#" class="nav-item flex flex-col items-center justify-center w-full py-2 text-blue-600" data-page="index">
            <i class='bx bxs-home-alt-2 text-2xl'></i>
            <span class="text-xs font-medium">Trang chủ</span>
        </a>
        <a href="#" class="nav-item flex flex-col items-center justify-center w-full py-2 text-gray-500 hover:text-blue-600" data-page="admission">
            <i class='bx bx-news text-2xl'></i>
            <span class="text-xs">Tuyển sinh</span>
        </a>
        <a href="#" class="nav-item flex flex-col items-center justify-center w-full py-2 text-gray-500 hover:text-blue-600" data-page="events">
            <i class='bx bxs-calendar-event text-2xl'></i>
            <span class="text-xs">Sự kiện</span>
        </a>
        <a href="./profile.html" class="nav-item flex flex-col items-center justify-center w-full py-2 text-gray-500 hover:text-blue-600" data-page="profile">
            <i class='bx bxs-contact text-2xl'></i>
            <span class="text-xs">Cá nhân</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/zmp-sdk@latest/zmp-sdk.min.js"></script>
    <script src="../utils/data.js"></script>
    <script src="./index.js"></script>
</body>
</html>
