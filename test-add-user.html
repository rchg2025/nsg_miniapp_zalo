<!DOCTYPE html>
<html>
<head>
    <title>Test Add User</title>
</head>
<body>
    <h1>Test Thêm Người Dùng</h1>
    
    <div>
        <label>Zalo ID:</label>
        <input type="text" id="zaloId" value="test123" />
    </div>
    <br>
    <div>
        <label>Role:</label>
        <select id="role">
            <option value="STUDENT">Học sinh</option>
            <option value="TEACHER">Giáo viên</option>
            <option value="ADMIN">Admin</option>
        </select>
    </div>
    <br>
    <button onclick="testAddUser()">Thêm Người Dùng</button>
    <button onclick="checkUserRoles()">Kiểm tra User Roles</button>
    <button onclick="clearUserRoles()">Clear All Roles</button>
    
    <div id="result"></div>

    <script>
        function testAddUser() {
            const zaloId = document.getElementById('zaloId').value;
            const role = document.getElementById('role').value;
            
            console.log('🧪 Testing add user:', { zaloId, role });
            
            // Simulate assignUserRole function
            try {
                const existingRoles = JSON.parse(localStorage.getItem('user_roles_db') || '[]');
                console.log('📋 Current roles:', existingRoles);
                
                const existingIndex = existingRoles.findIndex(r => r.zaloId === zaloId);
                
                const roleData = {
                    zaloId,
                    role,
                    assignedBy: 'admin',
                    assignedAt: new Date().toISOString(),
                    isActive: true
                };
                
                if (existingIndex >= 0) {
                    console.log('🔄 Updating existing user');
                    existingRoles[existingIndex] = roleData;
                } else {
                    console.log('➕ Adding new user');
                    existingRoles.push(roleData);
                }
                
                localStorage.setItem('user_roles_db', JSON.stringify(existingRoles));
                console.log('✅ User added successfully');
                document.getElementById('result').innerHTML = '<p style="color: green;">✅ User added successfully!</p>';
                
                // Verify
                checkUserRoles();
                
            } catch (error) {
                console.error('❌ Error:', error);
                document.getElementById('result').innerHTML = '<p style="color: red;">❌ Error: ' + error.message + '</p>';
            }
        }
        
        function checkUserRoles() {
            try {
                const roles = JSON.parse(localStorage.getItem('user_roles_db') || '[]');
                console.log('📋 Current user roles:', roles);
                
                let html = '<h3>Current User Roles:</h3>';
                if (roles.length === 0) {
                    html += '<p>No users found</p>';
                } else {
                    html += '<ul>';
                    roles.forEach(role => {
                        html += `<li><strong>${role.zaloId}</strong> - ${role.role} (by ${role.assignedBy})</li>`;
                    });
                    html += '</ul>';
                }
                
                document.getElementById('result').innerHTML = html;
            } catch (error) {
                console.error('❌ Error reading roles:', error);
                document.getElementById('result').innerHTML = '<p style="color: red;">❌ Error reading roles</p>';
            }
        }
        
        function clearUserRoles() {
            localStorage.removeItem('user_roles_db');
            console.log('🗑️ User roles cleared');
            document.getElementById('result').innerHTML = '<p style="color: orange;">🗑️ User roles cleared</p>';
        }
        
        // Check on load
        window.onload = function() {
            checkUserRoles();
        };
    </script>
</body>
</html>
